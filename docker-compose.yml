services:
  graphdb:
    image: ontotext/graphdb:10.8.12
    ports:
      - "7200:7200"
    volumes:
      - graphdb-data:/opt/graphdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7200/rest/repositories"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  graphdb-init:
    image: alpine:3
    command: sh -c "apk add --no-cache curl && sh /import-types.sh"
    volumes:
      - ./database/types:/import-data/types:ro
      - ./database/testdata:/import-data/testdata:ro
      - ./database/lucene_connectors:/sparql-updates:ro
      - ./docker/graphdb/repositories/EntEdit/config.ttl:/repo-config.ttl:ro
      - ./docker/graphdb/import-types.sh:/import-types.sh:ro
    environment:
      - GRAPHDB_URL=http://graphdb:7200
      - GRAPHDB_REPO=EntEdit
      # Set FORCE_REINIT=1 (e.g. via Docker Desktop) and restart this
      # container to wipe all repository data + connectors and re-import
      # from scratch. Leave unset for normal startups — the script will
      # detect the init marker and skip re-initialization.
      - FORCE_REINIT=${FORCE_REINIT:-0}
    depends_on:
      graphdb:
        condition: service_healthy
    restart: "no"

  web:
    build: ./app
    ports:
      - "80:80"
    depends_on:
      graphdb:
        condition: service_healthy

volumes:
  graphdb-data:
