<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EntEdit — Documentation</title>
<script>
  (function() {
    var stored = null;
    try { stored = localStorage.getItem("entEdit.language"); } catch(e) {}
    var lang = (stored === "no") ? "no" : "en";
    window.location.replace(lang + "/index.html" + window.location.hash);
  })();
</script>
<noscript>
  <meta http-equiv="refresh" content="0;url=en/index.html">
</noscript>
</head>
<body>
<p>Redirecting to <a href="en/index.html">documentation</a>...</p>
</body>
</html>
