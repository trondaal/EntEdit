server {
  listen 80;
  root /usr/share/nginx/html;

  # Redirect root to app
  location = / {
    return 301 /entedit/;
  }

  # SPA — serve index.html for all unknown paths under /entedit/
  location /entedit/ {
    try_files $uri $uri/ /entedit/index.html;
  }

  # Proxy /graphdb/* → GraphDB container (mirrors the Vite dev proxy)
  location /graphdb/ {
    proxy_pass         http://graphdb:7200/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 60s;
  }
}
